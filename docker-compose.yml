name: vertigis-host-kit

services:
  editor:
    image: ghcr.io/vertigis/host-kit/config-editor:latest
    ports:
      - 127.0.0.1:8080:8080
    volumes:
      - /opt/stacks:/opt/stacks
      - /var/run/docker.sock:/var/run/docker.sock
      - home:/root
    restart: unless-stopped

volumes:
  home: {}
